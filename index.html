<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>自律周结算系统</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="topbar">
        <div>
          <p class="eyebrow">Weekly Discipline System</p>
          <h1>自律周结算</h1>
          <span id="syncStatus" class="sync-status">正在连接后端...</span>
        </div>
        <div class="week-card">
          <span id="weekRange">本周</span>
          <strong id="totalScore">0</strong>
          <small>全员本周积分</small>
        </div>
      </section>

      <section class="people-bar" aria-label="成员切换">
        <div>
          <p class="eyebrow">Members</p>
          <h2>成员切换</h2>
        </div>
        <div class="person-tools">
          <div id="personTabs" class="person-tabs"></div>
          <form id="personForm" class="person-form">
            <input id="personNameInput" type="text" maxlength="12" placeholder="新增成员" aria-label="新增成员名称" />
            <button class="ghost-button" type="submit">添加</button>
          </form>
        </div>
      </section>

      <section class="summary-grid" aria-label="本周概览">
        <article class="summary-panel">
          <span>当前成员</span>
          <strong id="activePersonName">我</strong>
          <small id="activePersonScore">本周 0 分</small>
        </article>
        <article class="summary-panel">
          <span>个人等级</span>
          <strong id="levelName">见习者</strong>
          <div class="progress-track">
            <div id="levelProgress" class="progress-fill"></div>
          </div>
          <small id="nextLevelText">距离下一等级还差 0 分</small>
        </article>
        <article class="summary-panel">
          <span>达成率</span>
          <strong id="completionRate">0%</strong>
          <div class="progress-track">
            <div id="completionProgress" class="progress-fill accent"></div>
          </div>
          <small>按五项目标综合计算</small>
        </article>
        <article class="summary-panel">
          <span>已解锁成就</span>
          <strong id="achievementCount">0</strong>
          <small id="latestAchievement">先完成一项小目标</small>
        </article>
      </section>

      <section class="workspace">
        <div class="left-stack">
          <section class="panel tracker-panel">
            <div class="panel-heading">
              <div>
                <p class="eyebrow">Daily Inputs</p>
                <h2>按天录入</h2>
              </div>
              <button id="resetWeek" class="icon-button" type="button" title="清空本周">↺</button>
            </div>

            <div id="dailyCards" class="daily-card-grid" aria-label="每日打卡"></div>
            <button id="settleWeek" class="primary-button" type="button">结算本周</button>
          </section>

          <section class="panel history-panel">
            <div class="panel-heading">
              <div>
                <p class="eyebrow">Weekly Ledger</p>
                <h2>结算记录</h2>
              </div>
              <button id="clearHistory" class="ghost-button" type="button">清除记录</button>
            </div>
            <div id="historyList" class="history-list"></div>
          </section>
        </div>

        <div class="side-stack">
          <section class="panel leaderboard-panel">
            <div class="panel-heading">
              <div>
                <p class="eyebrow">Leaderboard</p>
                <h2>排行榜</h2>
              </div>
              <button id="generateReport" class="ghost-button" type="button">生成战报</button>
            </div>
            <div class="leaderboard-split">
              <section class="leaderboard-block">
                <h3>周排行</h3>
                <div id="weeklyLeaderboardList" class="leaderboard-list"></div>
              </section>
              <section class="leaderboard-block">
                <h3>总排行</h3>
                <div id="totalLeaderboardList" class="leaderboard-list"></div>
              </section>
            </div>
          </section>

          <section class="panel achievement-panel">
            <div class="panel-heading">
              <div>
                <p class="eyebrow">Achievements</p>
                <h2>个人成就墙</h2>
              </div>
            </div>
            <div id="achievementToneTabs" class="achievement-tone-tabs" aria-label="成就体系"></div>
            <div id="achievementOverview" class="achievement-overview"></div>
            <div id="achievementFilters" class="achievement-filters" aria-label="成就分类"></div>
            <div id="achievements" class="achievement-grid"></div>
          </section>
        </div>
      </section>
    </main>
    <div id="feedbackToast" class="feedback-toast" aria-live="polite" aria-atomic="true"></div>
    <div id="reportModal" class="report-modal" hidden>
      <div class="report-modal-backdrop" data-close-report></div>
      <section class="report-modal-dialog" role="dialog" aria-modal="true" aria-label="战报长图">
        <div class="report-modal-head">
          <div>
            <p class="eyebrow">Weekly Report</p>
            <h2>战报预览</h2>
          </div>
          <button id="closeReportModal" class="icon-button" type="button" aria-label="关闭战报">×</button>
        </div>
        <img id="reportModalImage" class="report-modal-image" alt="本周战报长图" />
        <div class="report-modal-actions">
          <a id="reportDownloadButton" class="ghost-button report-action" href="#" download>下载</a>
          <button id="reportCopyButton" class="ghost-button report-action" type="button">复制到剪贴板</button>
        </div>
      </section>
    </div>

    <script src="./app.js"></script>
  </body>
</html>
